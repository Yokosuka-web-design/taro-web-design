  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

">\n          <div style=\"width:56px;height:56px;border-radius:50%;background:#0071e3;color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px\">✓<\u002Fdiv>\n          <h3 style=\"margin:0;font-size:20px;font-weight:600;color:#1d1d1f\">お問い合わせありがとうございます<\u002Fh3>\n          <p style=\"margin:0;font-size:15px;color:#55555a;line-height:1.7\">内容を確認のうえ、48時間以内にご返信します。お急ぎの場合はInstagramのDMもご利用ください。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ handleSubmit }}\" style=\"background:#f5f5f7;border-radius:20px;padding:40px;display:flex;flex-direction:column;gap:20px\">\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <label for=\"cf-name\" style=\"font-size:13px;font-weight:600;color:#1d1d1f\">お名前<\u002Flabel>\n            <input id=\"cf-name\" name=\"name\" type=\"text\" required=\"\" style=\"height:44px;border-radius:10px;background:#fff;border:1px solid rgba(0,0,0,.15);font-size:16px;padding:0 14px;box-sizing:border-box;font-family:inherit\" style-focus=\"outline:2px solid #0071e3;outline-offset:1px\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <label for=\"cf-company\" style=\"font-size:13px;font-weight:600;color:#1d1d1f\">会社名・屋号<\u002Flabel>\n            <input id=\"cf-company\" name=\"company\" type=\"text\" style=\"height:44px;border-radius:10px;background:#fff;border:1px solid rgba(0,0,0,.15);font-size:16px;padding:0 14px;box-sizing:border-box;font-family:inherit\" style-focus=\"outline:2px solid #0071e3;outline-offset:1px\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:16px\">\n            <div style=\"flex:1 1 220px;display:flex;flex-direction:column;gap:8px\">\n              <label for=\"cf-email\" style=\"font-size:13px;font-weight:600;color:#1d1d1f\">メールアドレス<\u002Flabel>\n              <input id=\"cf-email\" name=\"email\" type=\"email\" required=\"\" style=\"height:44px;border-radius:10px;background:#fff;border:1px solid rgba(0,0,0,.15);font-size:16px;padding:0 14px;box-sizing:border-box;font-family:inherit\" style-focus=\"outline:2px solid #0071e3;outline-offset:1px\">\n            <\u002Fdiv>\n            <div style=\"flex:1 1 220px;display:flex;flex-direction:column;gap:8px\">\n              <label for=\"cf-tel\" style=\"font-size:13px;font-weight:600;color:#1d1d1f\">電話番号<\u002Flabel>\n              <input id=\"cf-tel\" name=\"tel\" type=\"tel\" style=\"height:44px;border-radius:10px;background:#fff;border:1px solid rgba(0,0,0,.15);font-size:16px;padding:0 14px;box-sizing:border-box;font-family:inherit\" style-focus=\"outline:2px solid #0071e3;outline-offset:1px\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px\">\n            <label for=\"cf-message\" style=\"font-size:13px;font-weight:600;color:#1d1d1f\">お問い合わせ内容<\u002Flabel>\n            <textarea id=\"cf-message\" name=\"message\" required=\"\" style=\"height:120px;border-radius:10px;background:#fff;border:1px solid rgba(0,0,0,.15);font-size:16px;padding:12px 14px;box-sizing:border-box;font-family:inherit;resize:vertical\" style-focus=\"outline:2px solid #0071e3;outline-offset:1px\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <button type=\"submit\" style=\"background:#0071e3;color:#fff;font-size:16px;font-weight:600;text-align:center;padding:14px;border-radius:24px;margin-top:6px;border:none;cursor:pointer;width:100%\" style-focus=\"outline:2px solid #1d1d1f;outline-offset:2px\">送信する<\u002Fbutton>\n          <p style=\"text-align:center;font-size:13px;color:#86868b;margin:0\">お急ぎの方は<a href=\"https://www.instagram.com/yokosuka_web_design/\" target=\"_blank\" rel=\"noopener\">InstagramのDM<\u002Fa>からもご相談いただけます<\u002Fp>\n        <\u002Fform>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<!-- FOOTER -->\n<footer style=\"background:#000;padding:64px clamp(20px,6vw,56px) 32px;display:flex;flex-direction:column;gap:40px\">\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:40px\">\n    <div>\n      <div style=\"font-size:17px;font-weight:600;color:#fff;margin-bottom:12px\">YOKOSUKA WEB DESIGN<\u002Fdiv>\n      <p style=\"font-size:14px;color:#a1a1a6;line-height:1.8;margin:0\">ホームページ制作・SNS集客支援<br>神奈川県横須賀市（対応エリア）<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:13px;font-weight:600;color:#fff;margin-bottom:14px\">サイトメニュー<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\">\n        <a href=\"#service\" style=\"color:#a1a1a6\">サービス<\u002Fa>\n        <a href=\"#pricing\" style=\"color:#a1a1a6\">料金<\u002Fa>\n        <a href=\"#works\" style=\"color:#a1a1a6\">実績<\u002Fa>\n        <a href=\"#faq\" style=\"color:#a1a1a6\">よくある質問<\u002Fa>\n        <a href=\"#contact\" style=\"color:#a1a1a6\">お問い合わせ<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:13px;font-weight:600;color:#fff;margin-bottom:14px\">SNS<\u002Fdiv>\n      <a href=\"https://www.instagram.com/yokosuka_web_design/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:8px;color:#a1a1a6;font-size:14px\">\n        <span style=\"width:20px;height:20px;border-radius:6px;border:1.5px solid #a1a1a6;display:inline-flex;align-items:center;justify-content:center\" aria-hidden=\"true\"><span style=\"width:8px;height:8px;border-radius:50%;border:1.5px solid #a1a1a6\"><\u002Fspan><\u002Fspan>\n        Instagram（@yokosuka_web_design）\n      <\u002Fa>\n    <\u002Fdiv>\n    <div>\n      <div style=\"font-size:13px;font-weight:600;color:#fff;margin-bottom:14px\">規約・ポリシー<\u002Fdiv>\n      <a href=\"privacy-policy.dc.html\" style=\"color:#a1a1a6;font-size:14px\">プライバシーポリシー<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-top:1px solid rgba(255,255,255,.12);padding-top:24px;font-size:12px;color:#6e6e73;text-align:center\">© 2026 YOKOSUKA WEB DESIGN. All rights reserved.<\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { revealed: {}, navOpen: false, submitted: false };\n  revealIds = ['strengths', 'services', 'process', 'pricing', 'works', 'testimonials', 'faq', 'map', 'contact'];\n  observer = null;\n  reducedMotion = false;\n\n  componentDidMount() {\n    this.reducedMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);\n    if (this.reducedMotion) {\n      const all = {};\n      this.revealIds.forEach((id) => { all[id] = true; });\n      this.setState({ revealed: all });\n      return;\n    }\n    this.observer = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (entry.isIntersecting) {\n          const id = entry.target.getAttribute('data-reveal-id');\n          if (id) {\n            this.setState((s) => (s.revealed[id] ? null : { revealed: { ...s.revealed, [id]: true } }));\n          }\n          this.observer.unobserve(entry.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\n  }\n\n  componentWillUnmount() {\n    if (this.observer) this.observer.disconnect();\n    document.body.style.overflow = '';\n  }\n\n  makeRevealRef(id) {\n    return (el) => {\n      if (el && this.observer) {\n        el.setAttribute('data-reveal-id', id);\n        this.observer.observe(el);\n      }\n    };\n  }\n\n  styleForReveal(id) {\n    if (this.reducedMotion) return { opacity: 1, transform: 'none' };\n    const on = !!this.state.revealed[id];\n    return { opacity: on ? 1 : 0, transform: on ? 'translateY(0)' : 'translateY(10px)' };\n  }\n\n  toggleNav = () => {\n    this.setState((s) => {\n      const next = !s.navOpen;\n      document.body.style.overflow = next ? 'hidden' : '';\n      return { navOpen: next };\n    });\n  };\n\n  closeNav = () => {\n    document.body.style.overflow = '';\n    this.setState({ navOpen: false });\n  };\n\n  handleSubmit = (e) => {\n    e.preventDefault();\n    this.setState({ submitted: true });\n  };\n\n  renderVals() {\n    const vals = {\n      navOpen: this.state.navOpen,\n      navOpenDisplay: this.state.navOpen ? 'flex' : 'none',\n      toggleNav: this.toggleNav,\n      closeNav: this.closeNav,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      handleSubmit: this.handleSubmit,\n    };\n    this.revealIds.forEach((id) => {\n      const st = this.styleForReveal(id);\n      vals[id + 'Ref'] = this.makeRevealRef(id);\n      vals[id + 'Opacity'] = st.opacity;\n      vals[id + 'Transform'] = st.transform;\n    });\n    return vals;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
